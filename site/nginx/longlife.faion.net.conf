server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name longlife.faion.net;

    # SSL (Cloudflare managed)
    ssl_certificate /etc/ssl/certs/ssl-cert-snakeoil.pem;
    ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;

    root /var/www/longlife.faion.net;
    index index.html;

    # Logs
    access_log /var/log/nginx/longlife.faion.net.access.log;
    error_log /var/log/nginx/longlife.faion.net.error.log;

    # Articles: /slug → /slug/index.html
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Static files caching
    location ~* \.(css|js|png|jpg|jpeg|webp|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;

    error_page 404 /404.html;
}
